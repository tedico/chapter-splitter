<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chapter Splitter</title>
<style>
  :root {
    --bg: #0f1117; --card: #181b24; --text: #e8eaf0; --muted: #8b91a3;
    --accent: #6c9bf2; --ok: #5fbf77; --err: #e06c75; --border: #2a2f3d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center; padding: 48px 16px;
  }
  h1 { font-size: 1.6rem; margin: 0 0 4px; }
  p.sub { color: var(--muted); margin: 0 0 32px; }
  .panel { width: 100%; max-width: 640px; }
  #drop {
    border: 2px dashed var(--border); border-radius: 12px; padding: 56px 24px;
    text-align: center; color: var(--muted); cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  #drop.drag { border-color: var(--accent); background: #1c2230; color: var(--text); }
  #drop strong { color: var(--accent); }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px; margin-top: 24px;
  }
  .spinner {
    display: inline-block; width: 16px; height: 16px; vertical-align: -3px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: var(--err); }
  .done-head { color: var(--ok); font-weight: 600; margin-bottom: 4px; }
  .meta { color: var(--muted); font-size: .85rem; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 8px 4px; border-top: 1px solid var(--border); }
  td.pages { color: var(--muted); white-space: nowrap; font-size: .85rem; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .dl { white-space: nowrap; text-align: right; }
  .zip-btn {
    display: inline-block; margin-top: 16px; background: var(--accent); color: #fff;
    padding: 10px 18px; border-radius: 8px; font-weight: 600;
  }
  .zip-btn:hover { text-decoration: none; filter: brightness(1.1); }
  .again { margin-top: 16px; }
  button.linklike {
    background: none; border: none; color: var(--accent); cursor: pointer;
    font: inherit; padding: 0;
  }
  .hidden { display: none; }
  .opt { display: block; margin-top: .6rem; font-size: .85rem; color: #667; cursor: pointer; }
</style>
</head>
<body>
<div class="panel">
  <h1>Chapter Splitter</h1>
  <p class="sub">Upload a book PDF → get one PDF + one Markdown file per chapter.</p>

  <div id="drop">
    <strong>Choose a PDF</strong> or drag &amp; drop it here<br>
    <span style="font-size:.85rem">up to 200 MB</span>
    <input type="file" id="file" accept="application/pdf" class="hidden">
  </div>

  <label class="opt">
    <input type="checkbox" id="redo">
    Re-OCR scanned pages for cleaner text (slow — up to ~30 min for a big book)
  </label>

  <div id="progress" class="card hidden">
    <span class="spinner"></span><span id="stage">Uploading…</span>
  </div>

  <div id="error" class="card error hidden"></div>

  <div id="result" class="card hidden">
    <div class="done-head" id="result-title"></div>
    <div class="meta" id="result-meta"></div>
    <table id="chapters"></table>
    <a id="zip" class="zip-btn" href="#">Download all (ZIP)</a>
    <div class="again"><button class="linklike" onclick="reset()">Split another book</button></div>
  </div>
</div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const els = {
  progress: document.getElementById('progress'),
  stage: document.getElementById('stage'),
  error: document.getElementById('error'),
  result: document.getElementById('result'),
};
let pollTimer = null;

drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => fileInput.files[0] && start(fileInput.files[0]));
['dragover', 'dragenter'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add('drag');
}));
['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.remove('drag');
}));
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) start(f);
});

function show(which) {
  for (const el of [els.progress, els.error, els.result]) el.classList.add('hidden');
  drop.classList.toggle('hidden', which !== 'drop');
  if (which !== 'drop') els[which].classList.remove('hidden');
}

function fail(msg) {
  clearTimeout(pollTimer);
  els.error.textContent = msg + ' ';
  const retry = document.createElement('button');
  retry.className = 'linklike';
  retry.textContent = 'Try again';
  retry.onclick = reset;
  els.error.appendChild(retry);
  show('error');
}

function reset() {
  clearTimeout(pollTimer);
  fileInput.value = '';
  show('drop');
}

async function start(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) return fail('Please choose a PDF file.');
  show('progress');
  els.stage.textContent = 'Uploading ' + file.name + '…';
  const form = new FormData();
  form.append('file', file);
  form.append('redo_ocr', document.getElementById('redo').checked);
  let res;
  try {
    res = await fetch('upload', { method: 'POST', body: form });
  } catch {
    return fail('Upload failed — network error.');
  }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    return fail(body.detail || ('Upload failed (HTTP ' + res.status + ').'));
  }
  poll((await res.json()).job_id);
}

function poll(jobId) {
  pollTimer = setTimeout(async () => {
    let res;
    try {
      res = await fetch('jobs/' + jobId);
    } catch {
      return poll(jobId); // transient network blip — keep polling
    }
    if (!res.ok) return fail('Lost track of the job (HTTP ' + res.status + ').');
    const job = await res.json();
    if (job.status === 'error') return fail(job.error || 'Processing failed.');
    if (job.status !== 'done') {
      els.stage.textContent = job.stage || 'Working…';
      return poll(jobId);
    }
    render(jobId, job);
  }, 1500);
}

function render(jobId, job) {
  document.getElementById('result-title').textContent =
    job.filename + ' — ' + job.chapters.length + ' chapters';
  document.getElementById('result-meta').textContent =
    job.method === 'bookmarks'
      ? 'Chapters detected from the PDF’s embedded bookmarks.'
      : 'Chapters detected by AI from the table of contents.';
  const table = document.getElementById('chapters');
  table.innerHTML = '';
  for (const ch of job.chapters) {
    const tr = document.createElement('tr');
    const fileUrl = n => 'jobs/' + jobId + '/files/' + encodeURIComponent(n);
    tr.innerHTML =
      '<td>' + escapeHtml(ch.title) + '</td>' +
      '<td class="pages">p. ' + ch.start_page + '–' + ch.end_page + '</td>' +
      '<td class="dl"><a href="' + fileUrl(ch.pdf) + '">PDF</a> · ' +
      '<a href="' + fileUrl(ch.md) + '">MD</a></td>';
    table.appendChild(tr);
  }
  document.getElementById('zip').href = 'jobs/' + jobId + '/zip';
  show('result');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
